<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wheel of Navjote Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { text-align: center; font-family: Arial, sans-serif; }
    #wheelCanvas {
      border: 2px solid #000;
      margin-top: 20px;
      touch-action: none;
    }
    #spinBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
    #unlockBtn {
      display: none;
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 18px;
      font-weight: bold;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    #unlockBtn:hover { background: #45a049; }
  </style>
</head>
<body>
  <h1>Wheel of Fortune</h1>
  <canvas id="wheelCanvas" width="400" height="400"></canvas>
  <div>
    <button id="spinBtn">SPIN</button>
  </div>
  <button id="unlockBtn">You have unlocked the Address</button>

  <!-- Tick sound -->
  <audio id="tickSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

  <script>
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const unlockBtn = document.getElementById("unlockBtn");
    const tickSound = document.getElementById("tickSound");

    const segments = ["Try Again","Enter","25th Dec","Navjote","Yummy Food","Next"];
    const colors = ["#f4a261","#2a9d8f","#e9c46a","#e76f51","#9d4edd","#0077b6"];
    const numSegments = segments.length;
    const anglePerSegment = (2 * Math.PI) / numSegments;
    let currentAngle = 0;
    let spinning = false;
    let spinCount = 0;

    function drawWheel() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const cx = canvas.width/2, cy = canvas.height/2, radius = canvas.width/2 - 10;

      for (let i=0;i<numSegments;i++) {
        const startAngle = currentAngle + i*anglePerSegment;
        const endAngle = startAngle + anglePerSegment;
        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.arc(cx,cy,radius,startAngle,endAngle);
        ctx.closePath();
        ctx.fillStyle = colors[i];
        ctx.fill();
        ctx.stroke();

        // Text
        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(startAngle + anglePerSegment/2);
        ctx.textAlign="right";
        ctx.fillStyle="black";
        ctx.font="18px Arial";
        ctx.fillText(segments[i], radius-10, 5);
        ctx.restore();
      }

      // Draw arrow at top
      ctx.beginPath();
      ctx.moveTo(cx,cy-radius-20);
      ctx.lineTo(cx-15,cy-radius-5);
      ctx.lineTo(cx+15,cy-radius-5);
      ctx.closePath();
      ctx.fillStyle="black";
      ctx.fill();
    }

    function spinWheel() {
      if (spinning) return;
      spinning = true;
      spinCount++;

      let targetAngle;
      if (spinCount === 3) {
        // Force the wheel to stop on "Enter"
        const enterIndex = segments.indexOf("Enter");
        targetAngle = (2*Math.PI - (enterIndex*anglePerSegment) + Math.PI/2);
      } else {
        // Random spin
        targetAngle = Math.random()*360 + 720;
      }

      let spinTime = 0;
      let spinTimeTotal = 3000; // 3 seconds

      function rotate() {
        spinTime += 30;
        if (spinTime >= spinTimeTotal) {
          spinning = false;
          // Determine final segment
          let finalAngle = currentAngle % (2*Math.PI);
          if (finalAngle < 0) finalAngle += 2*Math.PI;
          let index = Math.floor(((2*Math.PI - finalAngle + Math.PI/2) % (2*Math.PI)) / anglePerSegment);
          const result = segments[index];
          if (result==="Enter") {
            unlockBtn.style.display="inline-block";
          }
          return;
        }
        const angle = (targetAngle * (spinTimeTotal - spinTime)) / spinTimeTotal;
        currentAngle += (angle*Math.PI/180);
        drawWheel();

        // Play tick sound
        tickSound.currentTime = 0;
        tickSound.play();

        requestAnimationFrame(rotate);
      }
      rotate();
    }

    spinBtn.addEventListener("click", spinWheel);
    unlockBtn.addEventListener("click", ()=>{ window.location.href="address.html"; });

    drawWheel();
  </script>
</body>
</html>
